<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<title>ME17Suite — Mapa veza (Map Dependency Viewer)</title>
<style>
  :root {
    --bg: #111113;
    --surface: #1C1C1F;
    --surface2: #141418;
    --border: #2A2A32;
    --accent: #4FC3F7;
    --accent-light: #1A2F4A;
    --text: #C8C8D0;
    --text2: #808090;
    --mono: 'Consolas', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  .toolbar {
    height: 38px; background: var(--surface); border-bottom: 2px solid var(--border);
    display: flex; align-items: center; padding: 0 12px; gap: 6px; flex-shrink: 0;
  }
  .toolbar h1 { font-size: 13px; color: var(--accent); font-weight: bold; letter-spacing: 1px; margin-right: 12px; }
  .tb-sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }
  .tb-btn {
    padding: 4px 10px; background: none; border: 1px solid var(--border);
    color: var(--text2); cursor: pointer; border-radius: 3px; font-size: 11px; font-family: var(--mono);
    transition: all 0.1s;
  }
  .tb-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .tb-btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .tb-info { margin-left: auto; font-size: 11px; color: var(--text2); }

  .main { display: flex; flex: 1; overflow: hidden; }
  svg { flex: 1; cursor: grab; }
  svg:active { cursor: grabbing; }

  .sidebar {
    width: 300px; flex-shrink: 0; background: var(--surface2); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header {
    padding: 10px 14px; background: var(--surface); border-bottom: 1px solid var(--border);
    font-size: 11px; color: var(--text2); letter-spacing: 0.5px; text-transform: uppercase;
  }
  .sidebar-content { padding: 14px; overflow-y: auto; flex: 1; }
  .node-name { font-size: 14px; color: var(--accent); font-weight: bold; margin-bottom: 4px; }
  .node-addr { font-size: 11px; color: var(--text2); margin-bottom: 10px; }
  .node-desc { font-size: 12px; color: var(--text); line-height: 1.6; margin-bottom: 12px; white-space: pre-line; }
  .dep-section { margin-top: 10px; }
  .dep-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .dep-list { display: flex; flex-direction: column; gap: 4px; }
  .dep-item {
    padding: 4px 8px; border-radius: 3px; font-size: 11px; cursor: pointer;
    border: 1px solid transparent; transition: all 0.1s;
  }
  .dep-item:hover { opacity: 0.8; }
  .dep-in { background: rgba(79,195,247,0.1); border-color: rgba(79,195,247,0.3); color: #4FC3F7; }
  .dep-out { background: rgba(255,183,77,0.1); border-color: rgba(255,183,77,0.3); color: #FFB74D; }
  .placeholder { color: var(--text2); font-size: 12px; line-height: 1.6; }

  /* legend */
  .legend {
    padding: 10px 14px; border-top: 1px solid var(--border); flex-shrink: 0;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text2); }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .node text { pointer-events: none; }
  .link { fill: none; stroke-opacity: 0.5; }
  .link.highlighted { stroke-opacity: 1; stroke-width: 2.5; }
  .link.dimmed { stroke-opacity: 0.08; }
  .node circle { transition: r 0.2s; }
  .node.selected circle { stroke-width: 3px; stroke: #fff; }
  .node.dimmed { opacity: 0.2; }
  .arrow { fill: #555; }
</style>
</head>
<body>

<div class="toolbar">
  <h1>ME17Suite — Mapa veza</h1>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="resetView()">Reset prikaz</button>
  <button class="tb-btn active" id="btnLabels" onclick="toggleLabels()">Oznake</button>
  <button class="tb-btn" id="btnEdgeLabels" onclick="toggleEdgeLabels()">Veze tekst</button>
  <button class="tb-btn" id="btnFreeze" onclick="toggleFreeze()">Zaustavi</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="selectGroup('all')">Sve</button>
  <button class="tb-btn" onclick="selectGroup('GORIVO')" style="color:#64B5F6">Gorivo</button>
  <button class="tb-btn" onclick="selectGroup('PALJENJE')" style="color:#FF8A65">Paljenje</button>
  <button class="tb-btn" onclick="selectGroup('LAMBDA')" style="color:#81C784">Lambda</button>
  <button class="tb-btn" onclick="selectGroup('MOMENT')" style="color:#CE93D8">Moment</button>
  <button class="tb-btn" onclick="selectGroup('SC-BOOST')" style="color:#FFD54F">SC/Boost</button>
  <div class="tb-info">Klik = detalji &nbsp;|&nbsp; Drag = pomak &nbsp;|&nbsp; Scroll = zoom</div>
</div>

<div class="main">
  <svg id="graph"></svg>
  <div class="sidebar">
    <div class="sidebar-header">Detalji mape</div>
    <div class="sidebar-content" id="sidebarContent">
      <div class="placeholder">
        Klikni na mapu za prikaz detalja, veza i ovisnosti.
        <br><br>
        <b style="color:var(--accent)">Plava strelica</b> = ulaz (OVISI O)<br>
        <b style="color:#FFB74D">Narančasta strelica</b> = izlaz (UTJEČE NA)
      </div>
    </div>
    <div class="legend" id="legend"></div>
  </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>

  // Rev / DFCO
  { source: "rev_limit",    target: "dfco",          label: "rpm cut trigger" },
  { source: "rpm_axis",     target: "fuel_2d",       label: "RPM os" },
];

// ── RENDER ───────────────────────────────────────────────────────────────────

let showLabels = true;
let showEdgeLabels = false;
let frozen = false;
let simulation;
let selectedNodeId = null;

const svg = d3.select("#graph");
const width = () => svg.node().clientWidth;
const height = () => svg.node().clientHeight;

// Zoom
const zoom = d3.zoom().scaleExtent([0.2, 4]).on("zoom", (event) => {
  g.attr("transform", event.transform);
});
svg.call(zoom);

const g = svg.append("g");

// Arrow markers
const defs = svg.append("defs");
["link-arrow", "link-arrow-hl"].forEach((id, i) => {
  defs.append("marker").attr("id", id)
    .attr("viewBox", "0 -5 10 10").attr("refX", 28).attr("refY", 0)
    .attr("markerWidth", 6).attr("markerHeight", 6).attr("orient", "auto")
    .append("path").attr("d", "M0,-5L10,0L0,5")
    .attr("fill", i === 0 ? "#555" : "#4FC3F7");
});

// Links
const linkSel = g.append("g").attr("class", "links")
  .selectAll("line").data(links).join("line")
  .attr("class", "link")
  .attr("stroke", "#333")
  .attr("stroke-width", 1.5)
  .attr("marker-end", "url(#link-arrow)");

// Edge labels
const edgeLabelSel = g.append("g").attr("class", "edge-labels")
  .selectAll("text").data(links).join("text")
  .attr("text-anchor", "middle")
  .attr("font-size", "9px")
  .attr("fill", "#505060")
  .attr("font-family", "Consolas")
  .text(d => d.label)
  .style("display", "none");

// Nodes
const nodeGroup = g.append("g").attr("class", "nodes")
  .selectAll("g").data(nodes).join("g")
  .attr("class", "node")
  .call(d3.drag()
    .on("start", dragstarted)
    .on("drag", dragged)
    .on("end", dragended))
  .on("click", nodeClicked);

nodeGroup.append("circle")
  .attr("r", 28)
  .attr("fill", d => GROUPS[d.group].color)
  .attr("stroke", d => GROUPS[d.group].light)
  .attr("stroke-width", 1.5);

nodeGroup.append("text")
  .attr("text-anchor", "middle")
  .attr("dominant-baseline", "middle")
  .attr("font-size", "9.5px")
  .attr("fill", "#E0E0E0")
  .attr("font-family", "Consolas")
  .each(function(d) {
    const lines = d.label.split("\n");
    const el = d3.select(this);
    lines.forEach((line, i) => {
      el.append("tspan")
        .attr("x", 0)
        .attr("dy", i === 0 ? -(lines.length - 1) * 7 : 14)
        .text(line);
    });
  });

// Simulation
simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d => d.id).distance(120).strength(0.6))
  .force("charge", d3.forceManyBody().strength(-400))
  .force("center", d3.forceCenter(0, 0))
  .force("collide", d3.forceCollide(42))
  .on("tick", ticked);

function ticked() {
  linkSel
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x)
    .attr("y2", d => d.target.y);

  edgeLabelSel
    .attr("x", d => (d.source.x + d.target.x) / 2)
    .attr("y", d => (d.source.y + d.target.y) / 2);

  nodeGroup.attr("transform", d => `translate(${d.x},${d.y})`);
}

// Initial transform
setTimeout(() => {
  svg.call(zoom.transform, d3.zoomIdentity.translate(width() / 2, height() / 2).scale(0.75));
}, 100);

// ── INTERACTION ───────────────────────────────────────────────────────────────

function nodeClicked(event, d) {
  event.stopPropagation();
  if (selectedNodeId === d.id) {
    clearSelection();
    return;
  }
  selectedNodeId = d.id;

  // connected node ids
  const connectedIds = new Set([d.id]);
  links.forEach(l => {
    if ((l.source.id || l.source) === d.id) connectedIds.add(l.target.id || l.target);
    if ((l.target.id || l.target) === d.id) connectedIds.add(l.source.id || l.source);
  });

  nodeGroup.classed("dimmed", n => !connectedIds.has(n.id));
  nodeGroup.classed("selected", n => n.id === d.id);

  linkSel
    .classed("highlighted", l => (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id)
    .classed("dimmed", l => (l.source.id || l.source) !== d.id && (l.target.id || l.target) !== d.id)
    .attr("stroke", l => {
      if ((l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id) return "#4FC3F7";
      return "#333";
    })
    .attr("marker-end", l => {
      if ((l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id) return "url(#link-arrow-hl)";
      return "url(#link-arrow)";
    });

  // Sidebar
  const inputs = links.filter(l => (l.target.id || l.target) === d.id).map(l => l.source.id || l.source);
  const outputs = links.filter(l => (l.source.id || l.source) === d.id).map(l => l.target.id || l.target);

  const nodeLookup = Object.fromEntries(nodes.map(n => [n.id, n]));

  let html = `
    <div class="node-name">${d.label.replace("\n", " ")}</div>
    <div class="node-addr">${d.addr} &nbsp;|&nbsp; ${d.group}</div>
    <div class="node-desc">${d.desc}</div>`;

  if (inputs.length) {
    html += `<div class="dep-section"><div class="dep-label">Ovisi o (ulazi)</div><div class="dep-list">`;
    inputs.forEach(id => {
      const n = nodeLookup[id];
      if (n) html += `<div class="dep-item dep-in" onclick="clickNode('${id}')">${n.label.replace("\n", " ")}</div>`;
    });
    html += `</div></div>`;
  }
  if (outputs.length) {
    html += `<div class="dep-section"><div class="dep-label">Utječe na (izlazi)</div><div class="dep-list">`;
    outputs.forEach(id => {
      const n = nodeLookup[id];
      if (n) html += `<div class="dep-item dep-out" onclick="clickNode('${id}')">${n.label.replace("\n", " ")}</div>`;
    });
    html += `</div></div>`;
  }

  document.getElementById("sidebarContent").innerHTML = html;
}

function clickNode(id) {
  const d = nodes.find(n => n.id === id);
  if (d) {
    // Animate to node
    const tx = width() / 2 - d.x * 0.9;
    const ty = height() / 2 - d.y * 0.9;
    svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(0.9));
    nodeClicked({ stopPropagation: () => {} }, d);
  }
}

svg.on("click", clearSelection);

function clearSelection() {
  selectedNodeId = null;
  nodeGroup.classed("dimmed", false).classed("selected", false);
  linkSel.classed("highlighted", false).classed("dimmed", false)
    .attr("stroke", "#333").attr("marker-end", "url(#link-arrow)");
  document.getElementById("sidebarContent").innerHTML =
    `<div class="placeholder">Klikni na mapu za prikaz detalja, veza i ovisnosti.<br><br>
    <b style="color:var(--accent)">Plava strelica</b> = ulaz (OVISI O)<br>
    <b style="color:#FFB74D">Narančasta strelica</b> = izlaz (UTJEČE NA)</div>`;
}

function dragstarted(event, d) {
  if (!frozen && !event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragended(event, d) {
  if (!frozen && !event.active) simulation.alphaTarget(0);
  if (!frozen) { d.fx = null; d.fy = null; }
}

// ── TOOLBAR ACTIONS ───────────────────────────────────────────────────────────

function resetView() {
  svg.transition().duration(500).call(zoom.transform,
    d3.zoomIdentity.translate(width() / 2, height() / 2).scale(0.75));
}

function toggleLabels() {
  showLabels = !showLabels;
  nodeGroup.selectAll("text").style("display", showLabels ? null : "none");
  document.getElementById("btnLabels").classList.toggle("active", showLabels);
}

function toggleEdgeLabels() {
  showEdgeLabels = !showEdgeLabels;
  edgeLabelSel.style("display", showEdgeLabels ? null : "none");
  document.getElementById("btnEdgeLabels").classList.toggle("active", showEdgeLabels);
}

function toggleFreeze() {
  frozen = !frozen;
  document.getElementById("btnFreeze").classList.toggle("active", frozen);
  if (frozen) {
    simulation.stop();
    nodes.forEach(d => { d.fx = d.x; d.fy = d.y; });
  } else {
    nodes.forEach(d => { d.fx = null; d.fy = null; });
    simulation.alphaTarget(0.1).restart();
    setTimeout(() => simulation.alphaTarget(0), 2000);
  }
}

function selectGroup(grp) {
  if (grp === "all") { clearSelection(); return; }
  const inGroup = nodes.filter(n => n.group === grp).map(n => n.id);
  if (!inGroup.length) return;
  const d = nodes.find(n => n.group === grp);
  if (d) nodeClicked({ stopPropagation: () => {} }, d);
}

// ── LEGEND ───────────────────────────────────────────────────────────────────

const legend = document.getElementById("legend");
Object.entries(GROUPS).forEach(([name, g]) => {
  const item = document.createElement("div");
  item.className = "leg-item";
  item.innerHTML = `<div class="leg-dot" style="background:${g.light}"></div>${name}`;
  legend.appendChild(item);
});
</script>
</body>
</html>
